<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#141122" />
  <title>랜덤키우기</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div>
        <h1>랜덤키우기</h1>
        <p>태어날 때부터 운명이 갈리는 자동 성장 RPG</p>
      </div>
      <button id="saveBtn" class="ghost">저장</button>
    </header>

    <main class="layout">
      <section class="panel hero-panel">
        <div class="character-card">
          <div class="stage" id="stage">
            <div class="aura" id="aura"></div>
            <div class="player" id="playerSprite">
              <div class="horn left"></div>
              <div class="horn right"></div>
              <div class="eye left"></div>
              <div class="eye right"></div>
              <div class="mouth"></div>
            </div>
            <div class="enemy" id="enemySprite">
              <div class="enemy-eye left"></div>
              <div class="enemy-eye right"></div>
            </div>
            <div id="floatingText"></div>
          </div>
          <div class="char-info">
            <div>
              <h2 id="charName">무명의 씨앗</h2>
              <p id="charTitle">Lv. 1 · 새싹 존재</p>
            </div>
            <button id="newCharBtn" class="danger">새 캐릭터</button>
          </div>
          <div class="bars">
            <label>HP <span id="hpText">100 / 100</span></label>
            <div class="bar"><i id="hpBar"></i></div>
            <label>EXP <span id="expText">0 / 100</span></label>
            <div class="bar exp"><i id="expBar"></i></div>
          </div>
        </div>
      </section>

      <section class="panel stats-panel">
        <h3>성장 정보</h3>
        <div class="grid stats-grid">
          <div><span>레벨</span><b id="level">1</b></div>
          <div><span>전투력</span><b id="power">10</b></div>
          <div><span>골드</span><b id="gold">0</b></div>
          <div><span>처치</span><b id="kills">0</b></div>
        </div>
        <button id="huntBtn" class="primary wide">자동 사냥 중</button>
        <button id="passiveBtn" class="wide">패시브 목록</button>
        <button id="exportBtn" class="wide ghost">저장 데이터 내보내기</button>
        <button id="importBtn" class="wide ghost">저장 데이터 가져오기</button>
      </section>

      <section class="panel passive-panel">
        <h3>보유 패시브</h3>
        <div id="passiveList" class="passive-list"></div>
      </section>

      <section class="panel log-panel">
        <h3>기록</h3>
        <div id="log" class="log"></div>
      </section>
    </main>
  </div>

  <div id="createModal" class="modal active">
    <div class="modal-box">
      <h2>랜덤 캐릭터 생성</h2>
      <p>처음 생성 시 랜덤 패시브 1개를 가지고 시작합니다.</p>
      <input id="nameInput" placeholder="캐릭터 이름 입력" maxlength="12" />
      <button id="createBtn" class="primary wide">운명 뽑기</button>
    </div>
  </div>

  <div id="choiceModal" class="modal">
    <div class="modal-box choice-box">
      <h2>10레벨 보상</h2>
      <p>아래 3개의 랜덤 패시브 중 1개를 선택하세요.</p>
      <div id="choiceList" class="choice-list"></div>
    </div>
  </div>

  <div id="dataModal" class="modal">
    <div class="modal-box">
      <h2 id="dataTitle">저장 데이터</h2>
      <textarea id="dataBox" rows="8"></textarea>
      <div class="row">
        <button id="dataClose" class="ghost">닫기</button>
        <button id="dataApply" class="primary">적용</button>
      </div>
    </div>
  </div>

  <script src="skills.js"></script>
  <script src="game.js"></script>
</body>
</html>
