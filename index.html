<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>마계 진화록</title><link rel="stylesheet" href="styles.css"></head><body>
<div id="game">
<header><b>마계 진화록</b><span>서부 초원 · 자동사냥</span><button id="save">저장</button></header>
<section class="hud"><div class="profile"><div class="portrait">G</div><div><b>고블린 새끼</b><small>Lv. 1 · 최하급 마물</small><div class="bar hp"><i></i></div><div class="bar mp"><i></i></div></div></div><div class="quest"><b>진화의 길</b><small>고블린 전사 진화</small><p>슬라임 처치 <em id="kills">0</em> / 10</p></div></section>
<main id="field"><div class="mist"></div><div class="path"></div><div class="trees"></div><div class="rock r1"></div><div class="rock r2"></div><div class="player"><div class="name">고블린 새끼 Lv.1</div><div class="pbar"><i></i></div><div class="goblin"></div></div><div class="enemy"><div class="name">푸른 슬라임</div><div class="ebar"><i></i></div><div class="slime"></div></div><div id="hit"></div></main>
<section class="bottom"><div class="stats"><div>전투력 <b id="power">12</b></div><div>레벨 <b id="level">1</b></div><div>경험치 <b id="exp">0 / 100</b></div><div>마력석 <b id="gold">0</b></div></div><div class="log" id="log">자동사냥을 시작합니다.</div><div class="controls"><div class="joy">●</div><button id="auto">AUTO<br><small>자동사냥</small></button><button id="skill">독침</button><button id="evolve">진화<br><small>조건 미달</small></button><button>가방</button><button>스킬</button></div></section>
</div><script src="script.js"></script></body></html>
