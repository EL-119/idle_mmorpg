<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>황제의 길 - 3D Idle MMORPG</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>

    <header class="top-hud">
      <div>
        <p class="eyebrow">IDLE MMORPG</p>
        <h1>황제의 길</h1>
      </div>
      <button id="saveBtn" class="glass-btn">저장</button>
    </header>

    <section class="hero-panel glass">
      <div class="rank-badge" id="rankBadge">주민</div>
      <div class="hero-info">
        <p id="heroTitle">떠돌이 주민</p>
        <div class="level-line"><span id="levelText">Lv. 1</span><span id="powerText">전투력 10</span></div>
        <div class="bar"><span id="expBar"></span></div>
        <div class="stats-row"><span id="expText">EXP 0 / 100</span><span id="goldText">0 G</span></div>
      </div>
    </section>

    <section class="monster-panel glass">
      <div>
        <p class="tiny">자동 사냥터</p>
        <h2 id="monsterName">들판 슬라임</h2>
      </div>
      <div class="monster-hp">
        <span id="monsterHpText">HP 40 / 40</span>
        <div class="bar danger"><span id="monsterHpBar"></span></div>
      </div>
    </section>

    <section class="combat-log glass" id="combatLog">전투 준비 중...</section>

    <nav class="bottom-actions glass">
      <button id="evolveBtn">승급</button>
      <button id="weaponBtn">무기 강화</button>
      <button id="bossBtn">보스 도전</button>
      <button id="rewardBtn">보상</button>
    </nav>
  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
